name: Desktop Build

on:
  push:
  pull_request:

jobs:
  pyinstaller:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install desktop build dependencies
        run: python -m pip install --upgrade pip ".[gui,desktop-build]"
      - name: Build desktop executable
        run: python scripts/build_desktop.py
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: dist/desktop/**
