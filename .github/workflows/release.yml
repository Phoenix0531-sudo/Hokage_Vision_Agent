name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  desktop:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Linux Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0
      - name: Build desktop executable
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pip install --upgrade pip ".[gui,desktop-build]"
          python scripts/build_desktop.py
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: dist/desktop/**

  release:
    needs: [package, desktop]
    if: always() && needs.package.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release-upload
          cp release-artifacts/python-package/* release-upload/
          if [ -d release-artifacts/desktop-linux ]; then
            (cd release-artifacts/desktop-linux && zip -r ../../release-upload/desktop-linux.zip .)
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-upload/*
          generate_release_notes: true
