name: GUI Tests

on:
  push:
  pull_request:

jobs:
  gui:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      QT_API: pyside6
      HOKAGE_VISION_BACKEND: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0
      - name: Install GUI dependencies
        run: python -m pip install --upgrade pip ".[dev,gui]"
      - name: Run headless GUI smoke tests
        run: pytest tests/gui -m gui
