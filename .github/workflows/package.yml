name: Package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package tooling
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Install wheel and check console script
        run: |
          python -m venv /tmp/hokage-vision-wheel
          /tmp/hokage-vision-wheel/bin/python -m pip install --upgrade pip
          /tmp/hokage-vision-wheel/bin/python -m pip install dist/*.whl
          /tmp/hokage-vision-wheel/bin/hokage-vision --help
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
