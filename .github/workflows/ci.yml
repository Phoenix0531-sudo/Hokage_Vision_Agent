name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & unit/integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: System libs (headless Qt / OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 || true

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          # editable install so hokage_vision is importable (src layout)
          pip install -e ".[dev,api]"
          # GUI suite is covered by gui-tests.yml; unit suite should not require Qt
          # but pytest-qt is a dev dep — install essentials so collection is quiet
          pip install "PySide6-Essentials>=6.7" || true

      - name: Required project files
        run: |
          test -f README.md
          test -f LICENSE || test -f LICENSE.md
          test -d src/hokage_vision

      - name: Ruff (critical rules, hard)
        run: ruff check src tests/unit tests/integration --select E9,F63,F7,F82

      - name: Pytest unit + integration
        run: |
          # packaging wheel/console-script test is flaky on runner isolation; covered by package.yml
          python -m pytest -q tests/unit tests/integration
