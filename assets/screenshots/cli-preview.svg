<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-label="Hokage Vision Agent CLI preview">
  <defs>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1016"/>
      <stop offset="1" stop-color="#17100c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1440" height="720" fill="#090d12"/>
  <rect x="70" y="58" width="1300" height="604" rx="24" fill="url(#terminal)" stroke="#2c3540" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="58" width="1300" height="58" rx="24" fill="#151f2a"/>
  <rect x="70" y="92" width="1300" height="24" fill="#151f2a"/>
  <circle cx="110" cy="88" r="8" fill="#ff5f57"/>
  <circle cx="136" cy="88" r="8" fill="#ffbd2e"/>
  <circle cx="162" cy="88" r="8" fill="#28c840"/>
  <text x="198" y="96" fill="#f8fafc" font-family="Consolas, JetBrains Mono, monospace" font-size="20" font-weight="700">hokage-vision-agent · Docker demo</text>

  <g font-family="Consolas, JetBrains Mono, monospace" font-size="22">
    <text x="108" y="158" fill="#ffbd2e">$ docker compose run --rm test hokage-vision dataset validate configs/dataset.example.yaml</text>
    <text x="132" y="198" fill="#94f7c5">{ "valid": true, "image_count": 9, "box_count": 9, "manifest_exists": true }</text>

    <text x="108" y="258" fill="#ffbd2e">$ docker compose run --rm test hokage-vision detect image examples/images/sample.jpg --backend mock</text>
    <text x="132" y="298" fill="#e5e7eb">detections: obito 0.91 · naruto 0.84 · gaara 0.77</text>
    <text x="132" y="332" fill="#9ca3af">source: examples/images/sample.jpg · backend: mock · device: cpu</text>

    <text x="108" y="392" fill="#ffbd2e">$ docker compose run --rm test hokage-vision agent run "训练模型"</text>
    <text x="132" y="432" fill="#e5e7eb">tool_call: train_model</text>
    <text x="132" y="466" fill="#94f7c5">status: success · dry_run: true · dataset_valid: true · no shell access</text>

    <text x="108" y="526" fill="#ffbd2e">$ docker compose run --rm gui-test pytest tests/gui -m gui</text>
    <text x="132" y="566" fill="#94f7c5">6 passed · PySide6 headless smoke tests · QT_QPA_PLATFORM=offscreen</text>
  </g>

  <rect x="1056" y="542" width="238" height="66" rx="16" fill="url(#accent)"/>
  <text x="1086" y="582" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">Interview-ready path</text>
</svg>
