x-build-args: &build-args
  PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm}
  DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.ustc.edu.cn/debian}
  DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.ustc.edu.cn/debian-security}

services:
  test:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: pytest tests/unit tests/integration tests/packaging
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      QT_QPA_PLATFORM: offscreen

  gui-test:
    build:
      context: .
      target: gui-test
      args: *build-args
    image: hokage-vision-agent:gui
    command: pytest tests/gui -m gui
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src
      QT_QPA_PLATFORM: offscreen
      QT_API: pyside6

  api:
    build:
      context: .
      target: api
      args: *build-args
    image: hokage-vision-agent:api
    command: hokage-vision api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src

  package:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: sh -lc "python -m pip install -e '.[package]' && python -m build"
    volumes:
      - .:/workspace

  desktop-build:
    build:
      context: .
      target: desktop-build
      args: *build-args
    image: hokage-vision-agent:desktop-build
    command: python scripts/build_desktop.py
    volumes:
      - .:/workspace
    environment:
      QT_QPA_PLATFORM: offscreen

  docs:
    build:
      context: .
      target: docs
      args: *build-args
    image: hokage-vision-agent:docs
    command: mkdocs build
    volumes:
      - .:/workspace

  train:
    profiles:
      - train
    build:
      context: .
      target: train
      args: *build-args
    image: hokage-vision-agent:train
    command: hokage-vision train yolo --data configs/dataset.example.yaml --epochs 1 --dry-run
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src
